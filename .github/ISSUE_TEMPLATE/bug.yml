name: Bug report
description: Report reproducible behavior in the plugin or CLI.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command or Codex request and sanitized output.
    validations:
      required: true
  - type: input
    id: gh_version
    attributes:
      label: GitHub CLI version
      placeholder: gh version 2.x
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: Python 3.12
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Never paste tokens, secrets, or private repository content.
